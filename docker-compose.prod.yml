name: mahek-prod

services:
  mahek-backend:
    container_name: mahek-backend-prod
    build:
      context: .
      target: prod
    ports:
      - "9200:8000"
    restart: always
    env_file:
      - ./.env.production
    depends_on:
      - mahek-db
      - mahek-storage

  mahek-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mahek-storage-prod
    restart: always
    ports:
      - "9230:9000"
      - "9231:9090"
    env_file:
      - ./storage.env
    volumes:
      - ./persistent-data/storage:/data
    command: server /data --console-address ":9090"

  mahek-db:
    image: postgres:15
    container_name: mahek-db-prod
    restart: always
    ports:
      - "9201:5432"
    env_file:
      - ./.env.production
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
