name: mahek-dev

services:
  mahek-backend:
    container_name: mahek-backend
    user: 1001:1000
    build:
      context: .
      target: dev
    ports:
      - "9200:3000"
    volumes:
      - .:/app
      - ./.npm:/.npm
      - /app/node_modules
    env_file:
      - ./.env.development
    depends_on:
      - mahek-db
      - mahek-storage

  mahek-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mahek-storage
    restart: always
    ports:
      - "9230:9000"
      - "9231:9090"
    env_file:
      - ./storage.env
    volumes:
      - ./persistent-data/storage:/data
    command: server /data --console-address ":9090"

  mahek-db:
    image: postgres:15
    container_name: mahek-db
    restart: always
    ports:
      - "9201:5432"
    environment:
      POSTGRES_USER: maponomy_user
      POSTGRES_PASSWORD: maponomy_pass
      POSTGRES_DB: maponomypoultry_dev
    volumes:
      - ./postgres_data:/var/lib/postgresql/data